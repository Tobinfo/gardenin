name: GardenSnap
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.9
targets:
  GardenSnap:
    type: application
    platform: iOS
    sources:
      - GardenSnap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.gardensnap
        INFOPLIST_FILE: GardenSnap/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies: []
  GardenSnapTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - GardenSnapTests
    dependencies:
      - target: GardenSnap
